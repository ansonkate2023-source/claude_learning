services:
  pipeline:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    # Run every 6 hours via restart + sleep, or use external cron
    command: >
      sh -c "python -m src.main && echo 'Next run in 6 hours...' && sleep 21600"
    restart: unless-stopped
