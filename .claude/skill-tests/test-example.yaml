# Skill 測試範本 — 複製此檔案建立新測試
# /test-skill {skill-name}

skill: your-skill-name

# 冒煙：正常完成 + 有回應 + 無殘留變數 = 通過
smoke:
  - input: "正常輸入"
  - input: ""

tests:
  # 字串驗證（用 bash grep，100% 確定性）
  - name: "核心功能"
    input: "正常輸入"
    contains: ["預期關鍵字"]
    excludes: ["Error", "$ARGUMENTS"]

  # 副作用驗證（最可靠的測試類型）
  # - name: "檔案產出"
  #   input: "/tmp/out.txt"
  #   setup: "mkdir -p /tmp/test-ws"
  #   side_effects:
  #     - "[ -f /tmp/out.txt ]"
  #     - "grep -q 'expected' /tmp/out.txt"
  #   teardown: "rm -rf /tmp/test-ws"

  # 結構
  # - name: "長度合理"
  #   input: "something"
  #   min_length: 50
  #   max_length: 3000
  #   max_lines: 50

  # 回歸（首次建立快照，之後比對）
  # - name: "回歸"
  #   input: "standard-input"
  #   snapshot: "snapshots/your-skill.md"

# 自動附加 3 個對抗測試（injection、空輸入、特殊字元）
# 停用加這行：
# auto-adversarial: false
