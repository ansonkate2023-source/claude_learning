# Skill 測試範本 — 複製此檔案來建立新測試
# /test-skill {skill-name}

skill: your-skill-name

# ═══════════════════════════════════════
# 冒煙測試（最低門檻）
# 正常完成 + 有回應 + 沒有未替換變數 = 通過
# ═══════════════════════════════════════
smoke:
  - input: "正常輸入"
  - input: ""
  - input: "very long input repeated many times"

# ═══════════════════════════════════════
# 完整測試
# ═══════════════════════════════════════
tests:
  # ── 端到端 ──
  - name: "核心功能"
    input: "正常輸入"
    expect:
      contains: ["預期關鍵字"]
      excludes: ["Error"]

